# docker-compose.yml — Ansible Container with AnsibleRelay Plugins
#
# Container Ansible standalone incluant les plugins relay
# Permet d'exécuter des playbooks Ansible contre les agents AnsibleRelay
#
# Déploiement via Docker remote access :
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker compose -f docker-compose.ansible.yml up -d
#
# Variables d'environnement requises (fichier .env ou export) :
#   RELAY_SERVER_URL : URL du serveur relay (ex: http://relay-api:7770)
#   RELAY_TOKEN : plugin token pour relay-inventory (Bearer auth)

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # Ansible Container with AnsibleRelay Plugins
  # ─────────────────────────────────────────────────────────────────────────────

  relay-ansible:
    build:
      context: ../..
      dockerfile: GO/Dockerfile.ansible
    container_name: relay-ansible
    restart: unless-stopped

    # Environment variables pour les plugins relay
    environment:
      # Relay server configuration (relay-inventory binary)
      RELAY_SERVER_URL: "${RELAY_SERVER_URL:-http://relay-api:7770}"
      RELAY_TOKEN: "${RELAY_TOKEN}"
      RELAY_CA_BUNDLE: "${RELAY_CA_BUNDLE:-}"
      RELAY_ONLY_CONNECTED: "${RELAY_ONLY_CONNECTED:-false}"
      RELAY_INSECURE_TLS: "${RELAY_INSECURE_TLS:-false}"

      # Ansible configuration
      ANSIBLE_LIBRARY: /ansible/ansible_plugins/modules
      ANSIBLE_PLUGINS: /ansible/ansible_plugins
      ANSIBLE_HOST_KEY_CHECKING: "false"
      PYTHONUNBUFFERED: "1"

    # Volumes pour playbooks et inventory
    volumes:
      # Playbooks (à créer par l'utilisateur)
      - playbooks_volume:/ansible/playbooks

      # Inventory files
      - inventory_volume:/ansible/inventory

      # Roles (optionnel)
      - roles_volume:/ansible/roles

    # Network — connect to both relay-network and ansible_server_default
    # (ansible_server_default is where relay-api container lives)
    networks:
      - relay-network
      - ansible_server_default

    # Keep container running
    stdin_open: true
    tty: true

    # Health check
    healthcheck:
      test: ["CMD", "ansible", "--version"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  relay-network:
    driver: bridge

  # Reference to external network (created by main docker-compose.yml)
  ansible_server_default:
    external: true

volumes:
  playbooks_volume:
  inventory_volume:
  roles_volume:
