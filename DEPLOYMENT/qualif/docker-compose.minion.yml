# docker-compose.yml — AnsibleRelay Test Minions (Phase 8 — GO agents)
#
# Remplace les agents Python (Phase 1) par les agents GO (Phase 8).
# Les agents accèdent au GO server via network_mode: host (localhost:7770/7772)
#
# Déploiement via Docker remote access :
#   cd ansible_minion && DOCKER_HOST=tcp://192.168.1.218:2375 docker compose up --build -d
#
# Vérification :
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker logs relay-agent-go-01
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker logs relay-agent-go-02
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker logs relay-agent-go-03
#

services:

  # ── relay-agent-go-01 : GO agent #1 (qualif-host-01) ──────────────────────
  relay-agent-go-01:
    build:
      context: ../GO
      dockerfile: Dockerfile.agent
    image: relay-agent-go:latest
    container_name: relay-agent-go-01
    restart: unless-stopped
    environment:
      RELAY_SERVER_URL: "http://localhost:7770"
      RELAY_WS_URL: "ws://localhost:7772/ws/agent"
      RELAY_AGENT_HOSTNAME: "qualif-host-01"
      RELAY_PRIVATE_KEY: "/var/lib/relay-agent/id_rsa"
      RELAY_JWT_PATH: "/var/lib/relay-agent/token.jwt"
      RELAY_ENROLLMENT_TOKEN: "${RELAY_ENROLLMENT_TOKEN}"
      RELAY_ASYNC_DIR: "/var/lib/relay-agent/async"
      RELAY_INSECURE_TLS: "true"
      MAX_CONCURRENT_TASKS: "10"
    volumes:
      - relay_agent_go_01_data:/var/lib/relay-agent
    network_mode: host

  # ── relay-agent-go-02 : GO agent #2 (qualif-host-02) ──────────────────────
  relay-agent-go-02:
    build:
      context: ../GO
      dockerfile: Dockerfile.agent
    image: relay-agent-go:latest
    container_name: relay-agent-go-02
    restart: unless-stopped
    environment:
      RELAY_SERVER_URL: "http://localhost:7770"
      RELAY_WS_URL: "ws://localhost:7772/ws/agent"
      RELAY_AGENT_HOSTNAME: "qualif-host-02"
      RELAY_PRIVATE_KEY: "/var/lib/relay-agent/id_rsa"
      RELAY_JWT_PATH: "/var/lib/relay-agent/token.jwt"
      RELAY_ENROLLMENT_TOKEN: "${RELAY_ENROLLMENT_TOKEN}"
      RELAY_ASYNC_DIR: "/var/lib/relay-agent/async"
      RELAY_INSECURE_TLS: "true"
      MAX_CONCURRENT_TASKS: "10"
    volumes:
      - relay_agent_go_02_data:/var/lib/relay-agent
    network_mode: host

  # ── relay-agent-go-03 : GO agent #3 (qualif-host-03) ──────────────────────
  relay-agent-go-03:
    build:
      context: ../GO
      dockerfile: Dockerfile.agent
    image: relay-agent-go:latest
    container_name: relay-agent-go-03
    restart: unless-stopped
    environment:
      RELAY_SERVER_URL: "http://localhost:7770"
      RELAY_WS_URL: "ws://localhost:7772/ws/agent"
      RELAY_AGENT_HOSTNAME: "qualif-host-03"
      RELAY_PRIVATE_KEY: "/var/lib/relay-agent/id_rsa"
      RELAY_JWT_PATH: "/var/lib/relay-agent/token.jwt"
      RELAY_ENROLLMENT_TOKEN: "${RELAY_ENROLLMENT_TOKEN}"
      RELAY_ASYNC_DIR: "/var/lib/relay-agent/async"
      RELAY_INSECURE_TLS: "true"
      MAX_CONCURRENT_TASKS: "10"
    volumes:
      - relay_agent_go_03_data:/var/lib/relay-agent
    network_mode: host

volumes:
  relay_agent_go_01_data:
  relay_agent_go_02_data:
  relay_agent_go_03_data:
