# docker-compose.yml — Ansible-SecAgent Server (Phase 2)
#
# Déploiement du serveur relay uniquement (nats, relay-api, caddy)
# Utiliser docker-compose.clients.yml pour les agents de test
#
# Déploiement via Docker remote access :
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker compose up --build -d
#
# Variables d'environnement requises (fichier .env ou export) :
#   JWT_SECRET_KEY  : clef HMAC-SHA256 pour les JWT
#   ADMIN_TOKEN     : token Bearer pour /api/admin/authorize

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # PHASE 2 — secagent-server (nats + relay-api + caddy)
  # ─────────────────────────────────────────────────────────────────────────────

  # ── NATS JetStream ────────────────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    container_name: relay-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── relay-api (FastAPI multi-port) — 3 ports distincts pour sécurité ────────
  relay-api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: relay-api
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      NATS_URL: "nats://nats:4222"
      DATABASE_URL: "sqlite:////data/relay.db"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      LOG_LEVEL: "INFO"
    volumes:
      - secagent_data:/data
    expose:
      - "7770"
      - "7771"
      - "7772"
    ports:
      - "7770:7770"  # Client (enrollment + WSS)
      - "7771:7771"  # Plugin connection (exec/upload/fetch)
      - "7772:7772"  # Inventory plugin (admin)
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7770/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Caddy (reverse proxy + TLS) — optionnel pour production ──────────────────
  caddy:
    build:
      context: ..
      dockerfile: Dockerfile.caddy
    container_name: relay-caddy
    restart: unless-stopped
    ports:
      - "7443:7443"   # TLS frontend (optionnel, peut être remplacé par reverse proxy prod)
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      relay-api:
        condition: service_healthy
    environment:
      RELAY_API_AGENT_URL: "relay-api:7770"
      RELAY_API_PLUGIN_URL: "relay-api:7771"
      RELAY_API_INVENTORY_URL: "relay-api:7772"

volumes:
  nats_data:
  secagent_data:
  caddy_data:
  caddy_config:
