[defaults]
# Plugins Ansible pour AnsibleRelay
inventory_plugins = ./ansible_plugins/inventory_plugins
connection_plugins = ./ansible_plugins/connection_plugins

# Inventory dynamique via relay-inventory binary (GO)
inventory = /usr/local/bin/relay-inventory

# Pour les tests locaux, désactiver la vérification d'hôte
host_key_checking = False

# Variables d'authentification relay
[relay]
# Ces variables seront lues depuis l'environnement ou extra-vars
relay_token_file = /tmp/relay_token.jwt
relay_server_url = http://localhost:7770
relay_ca_bundle =
