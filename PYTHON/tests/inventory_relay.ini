# Inventaire statique pour test E2E multi-agent
# Déployé sur 192.168.1.218 via docker-compose
#
# Les agents connectés à relay-api:7770 :
#   - qualif-host-02 (relay-agent-02)
#   - qualif-host-03 (relay-agent-03)
#   - qualif-host-01 (relay-agent-01 — pending)
#

[relayed_agents]
qualif-host-02 ansible_connection=relay ansible_host=qualif-host-02 relay_status=connected
qualif-host-03 ansible_connection=relay ansible_host=qualif-host-03 relay_status=connected

[all:vars]
# Point vers le serveur relay sur 192.168.1.218
relay_server_host = 192.168.1.218
relay_server_port = 7770
relay_server_url = http://{{ relay_server_host }}:{{ relay_server_port }}

# JWT token file — doit être défini via variable d'environnement RELAY_TOKEN_FILE
# ou passé en extra-vars
# relay_token_file = /path/to/token.jwt
